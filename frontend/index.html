<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Task Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script>
    if (!localStorage.getItem("token")) {
        window.location.href = "login.html";
    }
    </script>

    <header class="main-header">
    <div class="logo">
        <h2>Black Grapes Softech</h2>
        <span>Project Task Management System</span>
    </div>

    <div class="user-section">
        <span id="welcomeUser"></span>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
</header>
<div class="container">
    <section class="dashboard">
    <div class="card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p id="pendingTasks">0</p>
    </div>

    <div class="card">
        <h3>In Progress</h3>
        <p id="inProgressTasks">0</p>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
    </div>
</section>

    <section class="task-form" id="taskForm">
    <h2>Add New Task</h2>
    <p>Enter Task Title:</p>
    <input type="text" id="title" placeholder="Task Title">
    <p>Enter Task Description:</p>
    <input type="text" id="description" placeholder="Task Description">
    <p>Enter Task Deadline:</p>
    <input type="date" id="deadline">
    <p>Assign Task to an Employee:</p>
    <select id="assignedTo">
    <option value="">Select Employee</option>
    </select>
    <button onclick="addTask()">Add Task</button>
    </section>

    <section class="task-list">
        <h2>All Tasks</h2>
        <div id="tasks"></div>
    </section>
</div>
<script src="js/app.js"></script>
</body>
</html>
